<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Spaans Trainer Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }
        h1 { font-size: 2.2rem; color: #2d3748; margin-bottom: 5px; }
        .subtitle { color: #718096; margin-bottom: 30px; font-size: 1.1rem; }
        
        .menu-btn {
            display: block;
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 15px 0;
            width: 100%;
            text-decoration: none;
            box-sizing: border-box;
            transition: background 0.2s;
        }
        .menu-btn:hover { background-color: #2b6cb0; }
        .werkwoorden-btn { background-color: #805ad5; }
        .werkwoorden-btn:hover { background-color: #6b46c1; }
    </style>
</head>
<body>

<div class="container">
    <h1>¡Hola!</h1>
    <div class="subtitle">Kies een oefening:</div>
    
    <a href="werkwoorden.html" class="menu-btn werkwoorden-btn">📝 Werkwoorden </a>
    
    <a href="woordenschat.html" class="menu-btn">📚 Woordenschat </a>
</div>

</body>
</html>
